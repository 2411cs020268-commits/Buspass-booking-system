spring.application.name=bus_ticket_booking_system

# ===============================
# DATABASE CONFIGURATION
# ===============================

# Creates the database automatically if it does not exist
spring.datasource.url=jdbc:mysql://localhost:3306/bus_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

# Creates/updates tables automatically on startup
spring.jpa.hibernate.ddl-auto=update

# Log SQL to console (disable in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Needed so Hibernate uses the correct MySQL dialect automatically
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=8080

logging.file.name=logs/application.log
